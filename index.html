<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Cortex Cloud ECS Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #111827;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
      max-width: 600px;
      text-align: center;
    }
    h1 {
      color: #38bdf8;
    }
    code {
      background: #1f2937;
      padding: 4px 8px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ECS Fargate Deployment Successful</h1>
    <p>This app was built from GitHub Actions, pushed to ECR, and deployed to ECS Fargate.</p>
    <p>Health endpoint: <code>/health</code></p>
  </div>
</body>
</html>
